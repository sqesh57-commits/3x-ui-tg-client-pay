services:
  bot:
    build: .
    container_name: 3xui-tg-client-pay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ADMIN_PANEL_PASSWORD=${ADMIN_PANEL_PASSWORD:-}
      - ENABLE_CODE_EDITOR=${ENABLE_CODE_EDITOR:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot_data:/app/data
      - ./users.db:/app/users.db
    ports:
      - "8501:8501"

volumes:
  bot_data:
